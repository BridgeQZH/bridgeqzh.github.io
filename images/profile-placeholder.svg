  </defs>
  <rect width="720" height="920" rx="42" fill="url(#bg)"/>
  <circle cx="360" cy="275" r="120" fill="url(#shape)" opacity="0.9"/>
  <path d="M186 744c25-154 109-241 174-241s149 87 174 241" fill="url(#shape)" opacity="0.9"/>
  <rect x="68" y="66" width="584" height="788" rx="34" fill="none" stroke="#ffffff" stroke-opacity="0.55" stroke-width="4"/>
