<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 920" role="img" aria-labelledby="title desc">
  <title id="title">Profile Placeholder</title>
  <desc id="desc">Placeholder portrait graphic for Zihan Qiao personal homepage.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fdf7ee"/>
      <stop offset="55%" stop-color="#d9ebe7"/>
      <stop offset="100%" stop-color="#f2dcc3"/>
    </linearGradient>
    <linearGradient id="shape" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1d6a6d"/>
      <stop offset="100%" stop-color="#2a3e47"/>
