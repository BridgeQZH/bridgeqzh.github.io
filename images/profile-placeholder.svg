  <text x="360" y="815" text-anchor="middle" font-family="Manrope, Arial, sans-serif" font-size="30" font-weight="700" fill="#3a4d4d">Replace This With Your Photo</text>
  <text x="360" y="855" text-anchor="middle" font-family="Manrope, Arial, sans-serif" font-size="20" fill="#5c6b69">images/profile-placeholder.svg</text>
